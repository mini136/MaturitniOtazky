<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="820" viewBox="0 0 1100 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .lbl-layer { font-size: 13px; font-weight: 600; fill: #555; }
      .lbl-osi   { font-size: 12px; fill: #888; font-style: italic; }
      .arrow-txt { font-size: 15px; font-weight: 700; }
    </style>
  </defs>

  <!-- background -->
  <rect width="1100" height="820" fill="#f8fafc" rx="12"/>

  <!-- title -->
  <text x="550" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Zapouzdření dat v síti (PDU)</text>

  <!-- OSI layer labels on left -->
  <!-- L2 label -->
  <text x="18" y="135" class="lbl-layer" fill="#1d4ed8">OSI 2</text>
  <text x="18" y="150" class="lbl-osi">Linková</text>
  <!-- L3 label -->
  <text x="18" y="325" class="lbl-layer" fill="#15803d">OSI 3</text>
  <text x="18" y="340" class="lbl-osi">Síťová</text>
  <!-- L4 label -->
  <text x="18" y="460" class="lbl-layer" fill="#7e22ce">OSI 4</text>
  <text x="18" y="475" class="lbl-osi">Transportní</text>
  <!-- L5-7 label -->
  <text x="18" y="570" class="lbl-layer" fill="#b45309">OSI 5-7</text>
  <text x="18" y="585" class="lbl-osi">Relační/Prez./Apl.</text>
  <!-- L1 label -->
  <text x="18" y="710" class="lbl-layer" fill="#64748b">OSI 1</text>
  <text x="18" y="725" class="lbl-osi">Fyzická</text>

  <!-- ===== ETHERNET RÁMEC (L2) ===== -->
  <rect id="layer-frame" x="100" y="80" width="970" height="660" rx="14"
        fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
  <text x="117" y="108" font-size="18" font-weight="700" fill="#1d4ed8">Ethernet rámec</text>
  <!-- Ethernet header left -->
  <rect x="115" y="120" width="175" height="600" rx="8"
        fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="202" y="398" text-anchor="middle" font-size="14" font-weight="600" fill="#1d4ed8" transform="rotate(-90,202,398)">Ethernet hlavička  (MAC dst · MAC src · EtherType)</text>
  <!-- FCS right -->
  <rect x="1045" y="120" width="45" height="600" rx="8"
        fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="1068" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#1d4ed8" transform="rotate(-90,1068,395)">FCS</text>

  <!-- ===== IPv4 PAKET (L3) ===== -->
  <rect id="layer-packet" x="310" y="140" width="710" height="560" rx="12"
        fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="327" y="167" font-size="17" font-weight="700" fill="#15803d">IPv4 / IPv6 paket</text>
  <!-- IP header left -->
  <rect x="325" y="178" width="165" height="500" rx="8"
        fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>
  <text x="408" y="418" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d" transform="rotate(-90,408,418)">IP hlavička  (src IP · dst IP · TTL · protokol)</text>

  <!-- ===== TCP/UDP SEGMENT (L4) ===== -->
  <rect id="layer-segment" x="515" y="200" width="475" height="440" rx="12"
        fill="#f3e8ff" stroke="#a855f7" stroke-width="3"/>
  <text x="532" y="227" font-size="16" font-weight="700" fill="#7e22ce">TCP / UDP segment</text>
  <!-- TCP header left -->
  <rect x="530" y="238" width="145" height="360" rx="8"
        fill="#e9d5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="602" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="#7e22ce" transform="rotate(-90,602,408)">TCP/UDP hlavička  (src port · dst port · příznaky)</text>

  <!-- ===== DATA (L5-7) ===== -->
  <rect id="layer-data" x="700" y="238" width="255" height="360" rx="10"
        fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="827" y="418" text-anchor="middle" font-size="20" font-weight="700" fill="#b91c1c">DATA</text>
  <text x="827" y="442" text-anchor="middle" font-size="12" fill="#b91c1c">(aplikační data)</text>

  <!-- ===== BITS (L1) ===== -->
  <rect id="layer-bits" x="100" y="760" width="970" height="45" rx="8"
        fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="585" y="789" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">0 1 0 0 1 0 1 1 ... — Bity (elektrický / optický / rádiový signál)</text>

  <!-- down arrow between rámec and bity -->
  <line x1="585" y1="742" x2="585" y2="756" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-highlight" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
