<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="70" y="90" font-family="Segoe UI" font-size="42" fill="#0f172a" font-weight="700">Razeni a slozitost O(n)</text>
  <rect x="90" y="160" width="320" height="470" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="130" y="220" font-family="Segoe UI" font-size="30" fill="#166534" font-weight="700">Linearni</text>
  <text x="120" y="270" font-family="Segoe UI" font-size="24" fill="#166534">Counting sort</text>
  <text x="120" y="310" font-family="Segoe UI" font-size="24" fill="#166534">pro omezeny rozsah</text>

  <rect x="440" y="160" width="320" height="470" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="470" y="220" font-family="Segoe UI" font-size="30" fill="#1e3a8a" font-weight="700">O(n log n)</text>
  <text x="470" y="270" font-family="Segoe UI" font-size="24" fill="#1e3a8a">Merge sort</text>
  <text x="470" y="310" font-family="Segoe UI" font-size="24" fill="#1e3a8a">Heap sort</text>
  <text x="470" y="350" font-family="Segoe UI" font-size="24" fill="#1e3a8a">Quick sort (avg)</text>

  <rect x="790" y="160" width="320" height="470" rx="16" fill="#fee2e2" stroke="#ef4444" stroke-width="3"/>
  <text x="840" y="220" font-family="Segoe UI" font-size="30" fill="#991b1b" font-weight="700">O(n^2)</text>
  <text x="825" y="270" font-family="Segoe UI" font-size="24" fill="#991b1b">Bubble sort</text>
  <text x="825" y="310" font-family="Segoe UI" font-size="24" fill="#991b1b">Selection sort</text>
  <text x="825" y="350" font-family="Segoe UI" font-size="24" fill="#991b1b">Insertion (worst)</text>
</svg>
