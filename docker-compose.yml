services:
  db:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_czech_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-maturitni_otazky}
      MYSQL_USER: ${MYSQL_USER:-maturitni}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-maturitni}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: ${MYSQL_DATABASE:-maturitni_otazky}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - ${APP_PORT:-8080}:3000
    restart: unless-stopped

volumes:
  mysql-data:
